<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Rohlik IMS</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="auth-card">
    <div class="auth-brand">rohlik</div>
    <div class="auth-sub">CREATE YOUR ACCOUNT</div>

    <div class="error-msg" id="err"></div>
    <div class="success-msg" id="ok"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Alice Smith">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="alice@company.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label>Account Type</label>
      <div class="radio-group">
        <label><input type="radio" name="role" value="user" checked> User</label>
        <label><input type="radio" name="role" value="supplier"> Supplier</label>
      </div>
    </div>

    <button class="btn" id="reg-btn" onclick="register()">Create Account</button>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>

  <script src="app.js"></script>
  <script>
    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = document.querySelector('input[name="role"]:checked').value;
      const errEl = document.getElementById('err');
      const okEl = document.getElementById('ok');
      const btn = document.getElementById('reg-btn');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (!name || !email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name, email, password, role }),
        });

        setToken(data.token);
        setUser({ id: data.userId, name, email, role });

        okEl.textContent = 'Account created! Redirecting…';
        okEl.style.display = 'block';
        setTimeout(() => window.location.href = role === 'admin' ? 'user-dashboard.html' : 'shop.html', 1200);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
  </script>
</body>

</html>
