<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Rohlik IMS</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="auth-card">
    <div class="auth-brand">rohlik</div>
    <div class="auth-sub">SIGN IN TO YOUR ACCOUNT</div>

    <div class="error-msg" id="err"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@company.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn" id="login-btn" onclick="login()">Sign In</button>
    <div class="auth-footer">No account? <a href="register.html">Register</a> · <a href="admin-login.html">Admin
        login</a></div>
  </div>

  <script src="app.js"></script>
  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('err');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'Please enter both email and password.'; errEl.style.display = 'block'; return; }

      btn.disabled = true; btn.textContent = 'Signing in…';

      try {
        const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        setToken(data.token);
        setUser(data.user);
        window.location.href = data.user.role === 'admin' ? 'user-dashboard.html' : 'shop.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>

</html>
